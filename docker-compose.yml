services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-art_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Make password auth compatible with PgBouncer's default md5 auth_file.
      # This is for local load testing; in production prefer SCRAM end-to-end.
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-art_platform}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 10
      RESERVE_POOL_TIMEOUT: 5
      SERVER_RESET_QUERY: DISCARD ALL
      # Helps avoid client-side timeouts during bursts.
      SERVER_IDLE_TIMEOUT: 60
    ports:
      - "6432:5432"

  backend-migrate:
    build:
      context: ./backend
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      POSTGRES_DB: ${POSTGRES_DB:-art_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "5432"
      DJANGO_DB_CONN_MAX_AGE: "0"
    command: ["sh", "-lc", "python wait_for_db.py && python manage.py migrate --noinput"]

  backend:
    build:
      context: ./backend
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      POSTGRES_DB: ${POSTGRES_DB:-art_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: pgbouncer
      POSTGRES_PORT: "5432"
      DJANGO_DB_CONN_MAX_AGE: "0"
    command:
      [
        "sh",
        "-lc",
        "python wait_for_db.py && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 60 --access-logfile - --error-logfile - --log-level info --capture-output",
      ]
    ports:
      - "8000:8000"

volumes:
  pgdata:

